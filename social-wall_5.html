<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Knowledge & Content Wall</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface2: #22222e;
      --border: #2e2e3e;
      --accent: #00c2ff;
      --accent2: #7c3aed;
      --accent3: #f59e0b;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --demo: #00c2ff;
      --linkedin: #0077b5;
      --knowledge: #7c3aed;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
    }

    header {
      padding: 28px 32px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .logo span {
      color: var(--accent);
    }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover, .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    .filter-btn[data-cat="Demo Submission"].active { background: var(--demo); border-color: var(--demo); color: #000; }
    .filter-btn[data-cat="LinkedIn Article"].active { background: var(--linkedin); border-color: var(--linkedin); color: #fff; }
    .filter-btn[data-cat="General Knowledge"].active { background: var(--knowledge); border-color: var(--knowledge); color: #fff; }

    .wall {
      padding: 28px 32px;
      columns: 3 320px;
      column-gap: 20px;
    }

    .card {
      break-inside: avoid;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      display: inline-block;
      width: 100%;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      animation: fadeUp 0.4s ease both;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }

    .card[data-cat="Demo Submission"] { border-top: 3px solid var(--demo); }
    .card[data-cat="LinkedIn Article"] { border-top: 3px solid var(--linkedin); }
    .card[data-cat="General Knowledge"] { border-top: 3px solid var(--knowledge); }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .badge-demo { background: rgba(0,194,255,0.15); color: var(--demo); }
    .badge-linkedin { background: rgba(0,119,181,0.2); color: #38bdf8; }
    .badge-knowledge { background: rgba(124,58,237,0.2); color: #a78bfa; }

    .card-date {
      font-size: 12px;
      color: var(--muted);
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 10px;
      color: var(--text);
    }

    .card-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-author {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid rgba(0,194,255,0.3);
      transition: all 0.2s;
    }

    .card-link:hover {
      background: rgba(0,194,255,0.1);
    }

    .card-link svg { width: 13px; height: 13px; }

    .status-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .status-approved { background: rgba(16,185,129,0.15); color: #10b981; }
    .status-pending { background: rgba(245,158,11,0.15); color: var(--accent3); }
    .status-rejected { background: rgba(239,68,68,0.15); color: #ef4444; }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      gap: 16px;
      color: var(--muted);
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    .empty h3 { font-family: 'Syne', sans-serif; font-size: 20px; margin-bottom: 8px; color: var(--text); }

    .error-banner {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      padding: 16px 24px;
      margin: 20px 32px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
    }

    .error-banner strong { display: block; margin-bottom: 4px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
      header { flex-direction: column; gap: 14px; align-items: flex-start; }
      .wall { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Team <span>Wall</span></div>
  <div class="filters">
    <button class="filter-btn active" data-cat="All">All</button>
    <button class="filter-btn" data-cat="Demo Submission">Demos</button>
    <button class="filter-btn" data-cat="LinkedIn Article">LinkedIn</button>
    <button class="filter-btn" data-cat="General Knowledge">Knowledge</button>
  </div>
</header>

<div id="error-container"></div>
<div id="wall" class="wall">
  <div class="loading">
    <div class="spinner"></div>
    <span>Loading submissions…</span>
  </div>
</div>

<script>
  // ─── CONFIG ────────────────────────────────────────────────────────────────
  const SITE_URL = "https://cisco.sharepoint.com/sites/SplunkIndustryTeam";
  const LIST_NAME = "Knowledge & Content Submissions";
  // ───────────────────────────────────────────────────────────────────────────

  let allCards = [];
  let activeFilter = "All";

  const badgeClass = {
    "Demo Submission": "badge-demo",
    "LinkedIn Article": "badge-linkedin",
    "General Knowledge": "badge-knowledge"
  };

  function getInitials(name) {
    if (!name) return "?";
    return name.split(" ").map(p => p[0]).join("").toUpperCase().slice(0, 2);
  }

  function formatDate(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  }

  function statusBadge(status) {
    if (!status) return "";
    const cls = {
      "Approved": "status-approved",
      "Rejected": "status-rejected",
      "Pending": "status-pending"
    }[status] || "status-pending";
    return `<span class="status-badge ${cls}">${status}</span>`;
  }

  function renderCards(items) {
    const wall = document.getElementById("wall");
    if (!items.length) {
      wall.innerHTML = `<div class="empty"><h3>No submissions yet</h3><p>Be the first to share something with the team.</p></div>`;
      return;
    }

    wall.innerHTML = items.map((item, i) => {
      const cat = item.Category || "General Knowledge";
      const author = item.Author?.Title || item.Author?.LookupValue || "Team Member";
      const link = item.Link_x002f_Url?.Url || "";
      const desc = item.Description || "";
      const status = item.Status || "Pending";
      const title = item.SubmissionTitle || item.Title || "Untitled";

      return `
        <div class="card" data-cat="${cat}" style="animation-delay:${i * 0.05}s">
          <div class="card-top">
            <span class="badge ${badgeClass[cat] || 'badge-knowledge'}">${cat}</span>
            <span class="card-date">${formatDate(item.Created)}</span>
          </div>
          <div class="card-title">${title}</div>
          ${desc ? `<div class="card-desc">${desc}</div>` : ""}
          <div class="card-footer">
            <div class="card-author">
              <div class="avatar">${getInitials(author)}</div>
              <span>${author}</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
              ${statusBadge(status)}
              ${link ? `<a class="card-link" href="${link}" target="_blank" rel="noopener">
                View
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
              </a>` : ""}
            </div>
          </div>
        </div>`;
    }).join("");
  }

  function applyFilter(cat) {
    activeFilter = cat;
    const filtered = cat === "All" ? allCards : allCards.filter(i => i.Category === cat);
    renderCards(filtered);
  }

  async function fetchItems() {
    const endpoint = `${SITE_URL}/_api/web/lists/getbytitle('${encodeURIComponent(LIST_NAME)}')/items?$orderby=Created desc&$top=100`;
    
    const res = await fetch(endpoint, {
      headers: { Accept: "application/json;odata=verbose" },
      mode: "cors"
    });
    if (!res.ok) throw new Error(`SharePoint API returned ${res.status}`);
    const data = await res.json();
    return data.d.results;
  }

  async function init() {
    try {
      allCards = await fetchItems();
      applyFilter("All");
    } catch (err) {
      document.getElementById("error-container").innerHTML = `
        <div class="error-banner">
          <strong>⚠️ Could not load submissions</strong>
          This page needs to be hosted on the same SharePoint tenant or embedded via the SharePoint Embed web part to authenticate correctly. 
          Make sure the list name matches exactly: <code>${LIST_NAME}</code>
          <br><br>Error: ${err.message}
        </div>`;
      document.getElementById("wall").innerHTML = "";
    }
  }

  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      applyFilter(btn.dataset.cat);
    });
  });

  init();
</script>
</body>
</html>
