<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Team Wall</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f7fa;
      --surface: #ffffff;
      --border: #e2e8f0;
      --accent: #00bceb;
      --accent2: #e4640a;
      --text: #1a202c;
      --muted: #718096;
      --demo: #00bceb;
      --linkedin: #0077b5;
      --knowledge: #e4640a;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); color: var(--text); min-height: 100vh; }
    header {
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
      gap: 16px;
      flex-wrap: wrap;
    }
    .logo { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; white-space: nowrap; }
    .logo span { color: var(--accent); }
    .logo em { color: var(--accent2); font-style: normal; }

    .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

    .search-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .search-wrap svg {
      position: absolute;
      left: 10px;
      width: 15px;
      height: 15px;
      color: var(--muted);
      pointer-events: none;
    }
    .search-input {
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 7px 14px 7px 32px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      width: 220px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: var(--accent); }

    .filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
    .filter-btn[data-cat="LinkedIn Article"].active { background: var(--linkedin); border-color: var(--linkedin); color: #fff; }
    .filter-btn[data-cat="General Knowledge"].active { background: var(--knowledge); border-color: var(--knowledge); color: #fff; }

    .wall { padding: 28px 32px; columns: 3 320px; column-gap: 20px; }

    .card {
      break-inside: avoid;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      display: inline-block;
      width: 100%;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      animation: fadeUp 0.4s ease both;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.5); border-color: #cbd5e0; }
    .card[data-cat="Demo"] { border-top: 3px solid var(--demo); }
    .card[data-cat="LinkedIn Article"] { border-top: 3px solid var(--linkedin); }
    .card[data-cat="General Knowledge"] { border-top: 3px solid var(--knowledge); }

    .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; letter-spacing: 0.3px; text-transform: uppercase; }
    .badge-demo { background: rgba(0,188,235,0.15); color: var(--demo); }
    .badge-linkedin { background: rgba(0,119,181,0.2); color: #38bdf8; }
    .badge-knowledge { background: rgba(228,100,10,0.15); color: var(--knowledge); }
    .card-date { font-size: 12px; color: var(--muted); }
    .card-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; line-height: 1.3; margin-bottom: 10px; color: var(--text); }
    .card-desc { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 16px; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; }
    .card-author { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }
    .avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .card-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
    .card-link {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; font-weight: 600;
      color: var(--accent); text-decoration: none;
      padding: 5px 10px; border-radius: 8px;
      border: 1px solid rgba(0,188,235,0.3);
      background: rgba(0,188,235,0.08);
      transition: all 0.2s;
    }
    .card-link:hover { background: rgba(0,188,235,0.18); }
    .card-link.attach { color: var(--accent2); border-color: rgba(228,100,10,0.3); background: rgba(228,100,10,0.08); }
    .card-link.attach:hover { background: rgba(228,100,10,0.18); }
    .status-badge { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.3px; }
    .status-approved { background: rgba(16,185,129,0.15); color: #10b981; }
    .status-pending { background: rgba(228,100,10,0.15); color: var(--knowledge); }
    .status-rejected { background: rgba(239,68,68,0.15); color: #ef4444; }

    .results-count { padding: 0 32px 0; font-size: 13px; color: var(--muted); margin-top: 16px; }

    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; gap: 16px; color: var(--muted); }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    .empty { text-align: center; padding: 80px 20px; color: var(--muted); }
    .empty h3 { font-family: 'Syne', sans-serif; font-size: 20px; margin-bottom: 8px; color: var(--text); }
    .error-banner { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; padding: 16px 24px; margin: 20px 32px; border-radius: 12px; font-size: 14px; }
    .error-banner strong { display: block; margin-bottom: 4px; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 600px) { header { flex-direction: column; align-items: flex-start; } .wall { padding: 20px 16px; } .search-input { width: 100%; } }
  </style>
</head>
<body>

<header>
  <div class="logo">Team <span>Wall</span> <em>| Splunk</em></div>
  <div class="header-right">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="search" type="text" placeholder="Search submissions…" />
    </div>
    <div class="filters">
      <button class="filter-btn active" data-cat="All">All</button>
      <button class="filter-btn" data-cat="Demo">Demos</button>
      <button class="filter-btn" data-cat="LinkedIn Article">LinkedIn</button>
      <button class="filter-btn" data-cat="General Knowledge">Knowledge</button>
    </div>
  </div>
</header>

<div id="error-container"></div>
<div id="results-count" class="results-count"></div>
<div id="wall" class="wall">
  <div class="loading"><div class="spinner"></div><span>Loading submissions…</span></div>
</div>

<script>
  const JSON_URL = "https://raw.githubusercontent.com/lsheen6210-dot/Cisco-Splunk/main/submissions.json";

  let allCards = [];
  let activeFilter = "All";
  let searchQuery = "";

  const badgeClass = {
    "Demo": "badge-demo",
    "LinkedIn Article": "badge-linkedin",
    "General Knowledge": "badge-knowledge"
  };

  function getInitials(name) {
    if (!name) return "?";
    return name.split(" ").map(p => p[0]).join("").toUpperCase().slice(0, 2);
  }

  function formatDate(iso) {
    if (!iso) return "";
    return new Date(iso).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  }

  function statusBadge(status) {
    if (!status) return "";
    const cls = { "Approved": "status-approved", "Rejected": "status-rejected", "Pending": "status-pending" }[status] || "status-pending";
    return `<span class="status-badge ${cls}">${status}</span>`;
  }

  function getField(item) {
    const cat = (item.Category && item.Category.Value) ? item.Category.Value : (item.Category || "General Knowledge");
    const status = (item.Status && item.Status.Value) ? item.Status.Value : (item.Status || "Pending");
    const author = (item.Author && item.Author.DisplayName) ? item.Author.DisplayName : "Team Member";
    const link = item.Link_x002f_Url || "";
    const desc = item.Description || "";
    const title = item.SubmissionTitle || item.Title || "Untitled";
    const itemLink = item["{Link}"] || "";
    const hasAttachments = item["{HasAttachments}"] || false;
    return { cat, status, author, link, desc, title, itemLink, hasAttachments };
  }

  function renderCards(items) {
    const wall = document.getElementById("wall");
    const countEl = document.getElementById("results-count");

    if (!items.length) {
      wall.innerHTML = `<div class="empty"><h3>No submissions found</h3><p>Try a different search or filter.</p></div>`;
      countEl.textContent = "";
      return;
    }

    countEl.textContent = `${items.length} submission${items.length !== 1 ? "s" : ""}`;

    wall.innerHTML = items.map((item, i) => {
      const { cat, status, author, link, desc, title, itemLink, hasAttachments } = getField(item);
      return `
        <div class="card" data-cat="${cat}" style="animation-delay:${i * 0.04}s">
          <div class="card-top">
            <span class="badge ${badgeClass[cat] || 'badge-knowledge'}">${cat}</span>
            <span class="card-date">${formatDate(item.Created)}</span>
          </div>
          <div class="card-title">${title}</div>
          ${desc ? `<div class="card-desc">${desc}</div>` : ""}
          <div class="card-footer">
            <div class="card-author">
              <div class="avatar">${getInitials(author)}</div>
              <span>${author}</span>
            </div>
            <div class="card-actions">
              ${statusBadge(status)}
              ${link ? `<a class="card-link" href="${link}" target="_blank" rel="noopener">View →</a>` : ""}
              ${hasAttachments && itemLink ? `<a class="card-link attach" href="${itemLink}" target="_blank" rel="noopener">📎 Files</a>` : ""}
            </div>
          </div>
        </div>`;
    }).join("");
  }

  function applyFilters() {
    let filtered = allCards;

    if (activeFilter !== "All") {
      filtered = filtered.filter(item => {
        const cat = (item.Category && item.Category.Value) ? item.Category.Value : (item.Category || "");
        return cat === activeFilter;
      });
    }

    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      filtered = filtered.filter(item => {
        const { cat, author, desc, title } = getField(item);
        return title.toLowerCase().includes(q) ||
               desc.toLowerCase().includes(q) ||
               cat.toLowerCase().includes(q) ||
               author.toLowerCase().includes(q);
      });
    }

    renderCards(filtered);
  }

  async function fetchItems() {
    const res = await fetch(JSON_URL);
    if (!res.ok) throw new Error(`Failed to load data: ${res.status}`);
    return await res.json();
  }

  async function init() {
    try {
      const raw = await fetchItems();
      allCards = raw.filter(item => {
        const status = (item.Status && item.Status.Value) ? item.Status.Value : (item.Status || '');
        return status === 'Approved';
      });
      applyFilters();
    } catch (err) {
      document.getElementById("error-container").innerHTML = `
        <div class="error-banner">
          <strong>⚠️ Could not load submissions</strong>
          Error: ${err.message}
        </div>`;
      document.getElementById("wall").innerHTML = "";
    }
  }

  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      activeFilter = btn.dataset.cat;
      applyFilters();
    });
  });

  document.getElementById("search").addEventListener("input", e => {
    searchQuery = e.target.value.trim();
    applyFilters();
  });

  init();
</script>
</body>
</html>
